# Planejamento Kick-off LiveLike — 01/04/2026

> **Objetivo do kick-off:** Alinhar escopo, prioridades e responsabilidades para que o Bolão vá ao ar em **11/05/2026**.

As pendências foram divididas em dois blocos:
- 🟦 **Pauta para a reunião com a LiveLike**
- 🟧 **Ações internas da CazéTV**

---

## 🟦 Pauta para a Reunião com a LiveLike

### #5 — Documentação de Look & Feel / Experiência do Bolão
**O que levar:** Perguntar à LiveLike exatamente que tipo de informações eles precisam para montar a experiência e visual do Bolão (fluxos, identidade visual, regras de negócio, etc.).  
**Ação pós-reunião:** Definir internamente quem será o responsável por produzir esse documento e estabelecer prazo de entrega.

---

### #6 — Estrutura de MVP, V1 e V2
**O que levar:** Proposta (ainda em aberto) de escopo mínimo para cada versão, com a restrição clara de que o **MVP precisa estar no ar em 11/05**.  
**Ação na reunião:**
- Alinhar com a LiveLike o que é tecnicamente viável para o MVP até 11/05.
- Validar quais features negociadas entram em cada versão (input para o item #8).
- Definir cerimônias de acompanhamento (sprints, demos, checkpoints).

---

## 🟧 Ações Internas da CazéTV

### #1 — Prazo para definição de sponsor (iFood)
**Contexto:** Precisamos saber se haverá sponsor antes de avançar com certas decisões comerciais e de comunicação.  
**Próximo passo:** Definir internamente até quando aguardamos retorno do iFood antes de mudar de estratégia. Sugestão: fixar **10/04** como data-limite de decisão (alinhado com o prazo da CEF).  
**Dono:** Liderança comercial/CEO.

---

### #2 — Registro na Caixa Econômica Federal (CEF) ⚠️ Prazo: 10/04
**Contexto:** Regularização do modelo de promoções, prêmios e sorteios.  
**Próximo passo:** Contratar imediatamente empresa especializada (advocacia/consultoria regulatória) para conduzir o processo junto à CEF.  
**Dono:** Jurídico / Financeiro.  
**Urgência:** 🔴 Alta — prazo fixo em **10/04**.

---

### #3 — Contrato com empresa terceira para SSO / Banco de Dados CazéTV
**Contexto:** A integração de identidade (SSO) e banco de dados próprio da CazéTV é pré-requisito técnico para a LiveLike.  
**Próximo passo:** Levantar fornecedores, solicitar propostas e estruturar contrato. Iniciar processo esta semana.  
**Dono:** Tech Lead / CTO.

---

### #4 — Ferramenta de SAC (Instagram / X / TikTok)
**Contexto:** Unificar e automatizar atendimento nos DMs. Já há análise prévia de ferramentas (contexto da conversa sobre SAC Omnichannel).  
**Próximo passo:** Retomar shortlist de ferramentas avaliadas, tomar decisão e contratar.  
**Dono:** Head de Operações / Customer Experience.

---

### #7 — Cobrar retorno sobre as Bets como sponsor
**Contexto:** Speech de posicionamento foi montado e disparado internamente, sem retorno até agora.  
**Próximos passos:**
1. Identificar quem recebeu o speech e ainda não respondeu — fazer follow-up direto (ligação ou reunião curta).
2. Definir um prazo interno de resposta (sugestão: **07/04**) antes de abordar as Bets diretamente.
3. Caso não haja avanço, acionar as Bets com abordagem direta — usar o cenário "iFood não avança" como gatilho.  
**Dono:** Comercial / Parcerias.

---

### #8 — Perguntas para Lives do YouTube (priorização de features)
**Contexto:** Validar com o público quais features do Bolão têm mais relevância para priorizar desenvolvimento e comunicação.  
**Próximo passo:** Estruturar roteiro de perguntas a serem feitas nas Lives — idealmente após o kick-off com LiveLike ter definido o escopo do MVP (#6), para que as perguntas sejam sobre as features reais disponíveis.  
**Dono:** Conteúdo / Produto.
